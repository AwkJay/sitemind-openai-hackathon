name: Keep Render backend warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -sf --max-time 60 https://sitemind-backend.onrender.com/api/health
      - name: Ping codebook health endpoint
        run: curl -sf --max-time 60 https://sitemind-codebook.onrender.com/health
